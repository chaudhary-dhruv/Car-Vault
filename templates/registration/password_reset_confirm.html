{% extends "base.html" %}

{% block content %}
<main class="mx-auto max-w-xl px-4 py-12 md:px-8">
    <div class="rounded-[2rem] border border-slate-200 bg-white p-8 shadow-sm">
        <h1 class="text-4xl font-black text-slate-900">Set a new password</h1>
        <form class="mt-8 space-y-4" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="rounded-2xl bg-primary px-6 py-3 text-sm font-black text-white" type="submit">Update Password</button>
        </form>
    </div>
</main>
{% endblock %}
