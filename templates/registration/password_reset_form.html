{% extends "base.html" %}

{% block title %}Password Reset | CarVault{% endblock %}

{% block content %}
<main class="mx-auto max-w-xl px-4 py-12 md:px-8">
    <div class="rounded-[2rem] border border-slate-200 bg-white p-8 shadow-sm">
        <p class="text-xs font-black uppercase tracking-[0.24em] text-primary">Password Reset</p>
        <h1 class="mt-2 text-4xl font-black tracking-tight text-slate-900">Reset your password</h1>
        <form class="mt-8 space-y-4" method="post">
            {% csrf_token %}
            {{ form.email.label_tag }}
            {{ form.email }}
            <button class="rounded-2xl bg-primary px-6 py-3 text-sm font-black text-white" type="submit">Send Reset Email</button>
        </form>
    </div>
</main>
{% endblock %}
