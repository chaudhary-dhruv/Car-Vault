<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Verify OTP | CarVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>body { font-family: "Inter", sans-serif; }</style>
</head>
<body class="min-h-screen bg-slate-950 text-white">
    <main class="flex min-h-screen items-center justify-center px-4 py-10">
        <div class="w-full max-w-md rounded-[2rem] border border-white/10 bg-white/5 p-8 shadow-2xl backdrop-blur">
            <p class="text-xs font-black uppercase tracking-[0.24em] text-rose-300">Account Activation</p>
            <h1 class="mt-3 text-4xl font-black tracking-tight">Verify your OTP</h1>
            <p class="mt-4 text-sm leading-7 text-slate-300">Enter the 6-digit code sent to your email to activate your buyer or seller account.</p>

            <form class="mt-8 space-y-4" method="post">
                {% csrf_token %}
                {{ form.email }}
                <div>
                    <label class="mb-2 block text-sm font-bold text-slate-200">OTP Code</label>
                    <input class="w-full rounded-2xl border border-white/10 bg-white/10 px-4 py-4 text-center text-2xl font-black tracking-[0.4em] text-white focus:border-rose-400 focus:outline-none" maxlength="6" name="code" value="{{ form.code.value|default:'' }}" placeholder="000000">
                    {% for error in form.code.errors %}
                    <p class="mt-2 text-xs text-rose-300">{{ error }}</p>
                    {% endfor %}
                </div>
                <button class="w-full rounded-2xl bg-rose-600 px-5 py-4 text-sm font-black text-white" type="submit">Verify Account</button>
            </form>

            <form action="{% url 'resend_otp' %}" class="mt-4" method="post">
                {% csrf_token %}
                {{ resend_form.email }}
                <button class="w-full rounded-2xl border border-white/15 px-5 py-4 text-sm font-black text-white/80" type="submit">Resend OTP</button>
            </form>

            <p class="mt-6 text-center text-sm text-slate-400">
                Already verified?
                <a class="font-bold text-rose-300" href="{% url 'login' %}">Back to login</a>
            </p>
        </div>
    </main>
</body>
</html>
