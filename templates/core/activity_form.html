{% extends "base.html" %}

{% block title %}Add Activity | CarVault{% endblock %}

{% block content %}
<main class="mx-auto max-w-4xl px-4 py-8 md:px-8">
    <div class="rounded-[2rem] border border-slate-200 bg-white p-6 shadow-sm md:p-8">
        <p class="text-xs font-black uppercase tracking-[0.24em] text-primary">Activity Tracker</p>
        <h1 class="mt-2 text-4xl font-black tracking-tight text-slate-900">Create an activity</h1>
        <form class="mt-8 grid gap-5 md:grid-cols-2" method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="{% if field.name == 'description' %}md:col-span-2{% endif %}">
                <label class="mb-2 block text-sm font-bold text-slate-700">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}
                <p class="mt-2 text-xs text-rose-600">{{ error }}</p>
                {% endfor %}
            </div>
            {% endfor %}
            <div class="md:col-span-2">
                <button class="rounded-2xl bg-primary px-6 py-3 text-sm font-black text-white" type="submit">Save Activity</button>
            </div>
        </form>
    </div>
</main>
{% endblock %}
