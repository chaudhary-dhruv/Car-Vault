<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CarAdmin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Link your CSS -->
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>

<div class="admin-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon">🚗</div>
            <div class="logo-text">
                <div class="title">CarAdmin</div>
                <div class="subtitle">System Control</div>
            </div>
        </div>

        <nav class="sidebar-menu">
            <a href="#" class="menu-item active">📊 Dashboard</a>
            <a href="#" class="menu-item">🚘 Manage Cars</a>
            <a href="#" class="menu-item">🔔 Notifications</a>
            <a href="#" class="menu-item">👥 Users</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Topbar -->
        <header class="topbar">
            <div class="search-box">
                <input type="text" placeholder="Search cars, users or logs...">
            </div>

            <div class="topbar-actions">
                <span class="icon">🔔</span>
                <span class="icon">⚙️</span>
                <div class="admin-profile">
                    <div class="avatar">A</div>
                    <div>
                        <div class="name">Admin User</div>
                        <div class="role">Super Admin</div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <main class="content">
            <h1>Dashboard</h1>
            <p>Your dashboard content goes here...</p>
        </main>

    </div>
</div>

</body>
</html>
