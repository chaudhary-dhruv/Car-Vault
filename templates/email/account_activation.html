<html>
<body style="font-family: Arial, sans-serif; background: #f8fafc; padding: 24px;">
    <div style="max-width: 560px; margin: 0 auto; background: white; border-radius: 18px; padding: 32px;">
        <p style="font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: #e11d48; font-weight: 700;">CarVault verification</p>
        <h1 style="font-size: 32px; margin: 12px 0; color: #0f172a;">Verify your account</h1>
        <p style="color: #475569; line-height: 1.7;">
            Hi {{ user.firstname }}, use the OTP below to activate your {{ user.get_role_display|lower }} account.
        </p>
        <div style="margin: 24px 0; padding: 18px; border-radius: 14px; background: #0f172a; text-align: center;">
            <span style="font-size: 32px; font-weight: 800; letter-spacing: 8px; color: white;">{{ otp.code }}</span>
        </div>
        <p style="color: #475569; line-height: 1.7;">This code expires in 10 minutes.</p>
    </div>
</body>
</html>
